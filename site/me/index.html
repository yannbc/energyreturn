<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yann Burden — CV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --fg: #1a1a1a;
    --fg2: #444;
    --fg3: #777;
    --bg: #fff;
    --accent: #2c5f2d;
    --border: #ddd;
    --serif: 'Source Serif 4', Georgia, serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--serif); color: var(--fg); background: var(--bg); font-size: 14px; line-height: 1.6; }

  .page { max-width: 760px; margin: 40px auto; padding: 48px 56px; }

  @media print {
    body { font-size: 11pt; }
    .page { margin: 0; padding: 32px 40px; max-width: none; }
    .no-print { display: none !important; }
    a { color: var(--fg); text-decoration: none; }
  }

  /* --- HEADER --- */
  header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--fg); }
  h1 { font-size: 28px; font-weight: 600; line-height: 1.2; }
  .tagline { font-size: 15px; font-weight: 300; color: var(--fg2); margin-top: 4px; }
  .contact-info { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--fg2); line-height: 1.8; }
  .contact-info a { color: var(--fg2); text-decoration: none; }
  .citizenship { font-family: var(--mono); font-size: 11px; color: var(--fg3); margin-top: 4px; }

  /* --- SECTIONS --- */
  .section { margin-bottom: 20px; }
  .section-title { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }

  /* --- HIGHLIGHTS --- */
  .highlights { font-size: 13px; color: var(--fg2); line-height: 1.7; }
  .highlights li { margin-bottom: 4px; margin-left: 16px; }

  /* --- ROLES --- */
  .role { margin-bottom: 16px; }
  .role-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .role-company { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--accent); }
  .role-dates { font-family: var(--mono); font-size: 11px; color: var(--fg3); }
  .role-title { font-size: 16px; font-weight: 400; margin-bottom: 4px; }
  .role-bullets { font-size: 13px; color: var(--fg2); }
  .role-bullets li { margin-bottom: 3px; margin-left: 16px; }

  /* --- SIDEBAR ITEMS (education, advisory, etc) --- */
  .compact-item { margin-bottom: 10px; }
  .compact-item .item-org { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--fg); }
  .compact-item .item-detail { font-size: 13px; color: var(--fg2); }
  .compact-item .item-dates { font-family: var(--mono); font-size: 10px; color: var(--fg3); }

  /* --- TWO COLUMN --- */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

  /* --- FOCUS TAGS --- */
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border: 1px solid var(--border); border-radius: 3px; color: var(--fg2); }

  /* --- FLAVOUR PICKER (screen only) --- */
  .flavour-bar { max-width: 760px; margin: 20px auto 0; padding: 12px 56px; font-family: var(--mono); font-size: 11px; color: var(--fg3); }
  .flavour-bar button { font-family: var(--mono); font-size: 11px; padding: 4px 12px; margin-right: 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--fg2); cursor: pointer; }
  .flavour-bar button.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
</style>
</head>
<body>

<div class="flavour-bar no-print">
  <span>Flavour: </span>
  <button class="active" onclick="setFlavour('default')">Full</button>
  <button onclick="setFlavour('operations')">Operations / CTO</button>
  <button onclick="setFlavour('ai')">AI Leadership</button>
  <button onclick="setFlavour('advisory')">Advisory / Consulting</button>
</div>

<div class="page" id="cv"><!-- rendered by JS --></div>

<script>
// ============================================================
// CV DATA — edit this object to update all content
// ============================================================
const CV = {
  name: "Yann Burden",
  taglines: {
    default:    "Technology Executive. Exited Founder and Operator.",
    operations: "Technology and Operations Executive. Exited Founder.",
    ai:         "Product, Technology and AI Executive. Exited Founder.",
    advisory:   "Technology Leadership and AI Advisory. Exited Founder.",
  },
  contact: {
    phone: "+61 400 941 979",
    email: "yannburden@gmail.com",
    web: "energyreturn.co/me",
    linkedin: "yannburden",
  },
  citizenship: "🇦🇺 🇬🇧 🇪🇺 🇨🇦  Working rights: Australia, UK, EU, Canada",

  // --- HIGHLIGHTS: each has text + which flavours it appears in ---
  highlights: [
    { text: "Founded and scaled Billcap (multi-tenant SaaS for energy utilities) as CEO through to exit at 8x investor return.", flavours: ["default","operations","ai","advisory"] },
    { text: "Hired as CPTO at Pendula, led engineering, product and AI organisation through international expansion and acquisition by Smart Communications at 4x invested capital.", flavours: ["default","operations","ai"] },
    { text: "Drove $5M incremental ARR by reorienting platform delivery toward enterprise clients.", flavours: ["default","operations"] },
    { text: "Built Pendula's London operation from scratch with GM mandate: market entry, hiring, first UK client.", flavours: ["default","operations"] },
    { text: "Built and operated customer engagement platforms across 5 energy retailers and 250,000+ end users, each with distinct regulatory and operational requirements.", flavours: ["default","operations","ai"] },
    { text: "A decade advising CIOs and boards on technology strategy, IT organisation design and large-scale outsourcing across Australia, UK and Europe (Accenture, PwC, Unilog).", flavours: ["default","operations","advisory"] },
    { text: "Venture Partner at Black Nova VC, coaching growth-stage portfolio founders on AI strategy, architecture decisions, and build discipline.", flavours: ["ai","advisory"] },
    { text: "Industry advisory board member at the University of Melbourne (2015-2024), bridging technology industry practice with academic curriculum.", flavours: ["advisory"] },
  ],

  // --- FOCUS TAGS per flavour ---
  focus: {
    default:    ["Energy and Utilities","Scale-Up SaaS","AI Strategy","International Expansion","Platform Operations"],
    operations: ["Energy and Utilities","Scale-Up SaaS","International Expansion","Platform Operations","DER and Flexibility"],
    ai:         ["AI Strategy","Conversational AI","Customer Engagement","Scale-Up SaaS","Energy and Utilities"],
    advisory:   ["AI Strategy","Organisational Change","Education","Energy and Utilities","SaaS"],
  },

  // --- EXPERIENCE ---
  roles: [
    {
      company: "Pendula", dates: "2021 - 2024", title: "Chief Product and Technology Officer",
      flavours: ["default","operations","ai"],
      bullets: [
        { text: "Hired as CPTO. Led engineering and product teams.", flavours: ["default","operations","ai"] },
        { text: "Unlocked additional $5M ARR by leading enterprise product focus.", flavours: ["default","operations"] },
        { text: "Set up London offices as part of international growth strategy post Series A, signed first UK deal.", flavours: ["default","operations"] },
        { text: "Led strategy and AI initiatives through to sale to Smart Communications at 4x invested capital.", flavours: ["default","operations","ai"] },
      ]
    },
    {
      company: "DC Power Co", dates: "2018 - 2021", title: "Chief Customer and Technology Officer",
      flavours: ["default","operations","ai","advisory"],
      bullets: [
        { text: "Founding executive team of Australia's first crowd-funded renewable energy retailer.", flavours: ["default","operations","ai","advisory"] },
        { text: "Delivered strategic NPS of +51 in first year of operation.", flavours: ["default","operations"] },
        { text: "Developed in-house customer engagement product reducing churn by over 25%.", flavours: ["default","operations","ai"] },
        { text: "Set up digital sales channel delivering market-leading conversion rates for battery storage.", flavours: ["default","operations"] },
      ]
    },
    {
      company: "Billcap", dates: "2011 - 2018", title: "CEO and Co-founder",
      flavours: ["default","operations","ai","advisory"],
      bullets: [
        { text: "Co-founded and led company delivering customer engagement SaaS platform to energy retailers and distributors.", flavours: ["default","operations","ai","advisory"] },
        { text: "Grew client base to 5 energy companies and over 250,000 users.", flavours: ["default","operations"] },
        { text: "Led sale of company to strategic investor delivering 8x return to investors.", flavours: ["default","operations","advisory"] },
        { text: "Established pioneering research partnership for behavioural science field experiments in energy consumption and demand response.", flavours: ["default","ai","advisory"] },
      ]
    },
  ],

  // --- EARLIER EXPERIENCE ---
  earlier: [
    { text: "Energy Return | 2009 - 2011 | Founder and MD. Energy efficiency consulting for local government.", flavours: ["default","operations","advisory"] },
    { text: "Cool Nrg | 2007 - 2009 | General Manager (France). Nation-wide residential energy efficiency and carbon abatement for energy retailers.", flavours: ["default","operations"] },
    { text: "Accenture (UK) | 2005 - 2007 | Technology Strategy Manager. CIO advisory, IT organisation design, telco strategy.", flavours: ["default","operations","advisory"] },
    { text: "Unilog (France) | Technology Strategy. Energy retail focus.", flavours: ["default","advisory"] },
    { text: "PwC Consulting | SAP Consultant.", flavours: ["default"] },
  ],

  // --- ADVISORY and BOARDS ---
  advisory: [
    { org: "Black Nova Venture Capital", role: "Venture Partner, AI Advisory", dates: "2025 -", flavours: ["default","ai","advisory"] },
    { org: "University of Melbourne", role: "Honorary Industry Fellow, School of Computing and Information Systems", dates: "2015 - 2024", flavours: ["default","advisory"] },
    { org: "Bendigo Bank Community Bank", role: "Non-Executive Director", dates: "2010 - 2017", flavours: ["default"] },
  ],

  // --- EDUCATION ---
  education: [
    { org: "University of Melbourne", detail: "Bachelor of Science (Information Systems)", dates: "1998" },
  ],

  // --- RESEARCH ---
  research: [
    { title: "Tell Me Something I Don't Already Know: Informedness and the Impact of Information Programs", journal: "Review of Economics and Statistics", year: "2018", url: "https://direct.mit.edu/rest/article/100/3/510/58467/Tell-Me-Something-I-Don-t-Already-Know", authors: "Byrne, La Nauze, Martin", flavours: ["default","ai","advisory"] },
    { title: "An Experimental Study of Monthly Electricity Demand (In)elasticity", journal: "The Energy Journal", year: "2021", url: "https://journals.sagepub.com/doi/10.5547/01956574.42.2.dbyr", authors: "Byrne, La Nauze, Martin", flavours: ["default","ai","advisory"] },
    { title: "Power from the People: Rooftop Solar and a Downward-Sloping Supply of Electricity", journal: "Journal of Political Economy", year: "2019", url: "https://doi.org/10.1086/705535", authors: "La Nauze (acknowledges Yann Burden and Billcap for proprietary data)", flavours: ["default","ai","advisory"] },
  ],
};

// ============================================================
// RENDERER
// ============================================================
let currentFlavour = 'default';

function setFlavour(f) {
  currentFlavour = f;
  document.querySelectorAll('.flavour-bar button').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(f === 'default' ? 'full' : f));
  });
  render();
}

function show(item) {
  if (!item.flavours) return true;
  return item.flavours.includes(currentFlavour);
}

function render() {
  const f = currentFlavour;
  const tagline = CV.taglines[f] || CV.taglines.default;
  const focusTags = CV.focus[f] || CV.focus.default;

  let html = `
    <header>
      <div>
        <h1>${CV.name}</h1>
        <div class="tagline">${tagline}</div>
      </div>
      <div class="contact-info">
        ${CV.contact.phone}<br>
        <a href="mailto:${CV.contact.email}">${CV.contact.email}</a><br>
        <a href="https://${CV.contact.web}">${CV.contact.web}</a><br>
        <a href="https://linkedin.com/in/${CV.contact.linkedin}">linkedin.com/in/${CV.contact.linkedin}</a>
        <div class="citizenship">${CV.citizenship}</div>
      </div>
    </header>
  `;

  // Highlights
  const visHighlights = CV.highlights.filter(show);
  if (visHighlights.length) {
    html += `<div class="section"><div class="section-title">Highlights</div><ul class="highlights">`;
    visHighlights.forEach(h => html += `<li>${h.text}</li>`);
    html += `</ul></div>`;
  }

  // Focus
  html += `<div class="section"><div class="section-title">Focus</div><div class="tags">`;
  focusTags.forEach(t => html += `<span class="tag">${t}</span>`);
  html += `</div></div>`;

  // Experience
  const visRoles = CV.roles.filter(show);
  if (visRoles.length) {
    html += `<div class="section"><div class="section-title">Experience</div>`;
    visRoles.forEach(r => {
      const visBullets = r.bullets.filter(show);
      html += `<div class="role">
        <div class="role-header"><span class="role-company">${r.company} | ${r.dates}</span></div>
        <div class="role-title">${r.title}</div>`;
      if (visBullets.length) {
        html += `<ul class="role-bullets">`;
        visBullets.forEach(b => html += `<li>${b.text}</li>`);
        html += `</ul>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Earlier experience
  const visEarlier = CV.earlier.filter(show);
  if (visEarlier.length) {
    html += `<div class="section"><div class="section-title">Earlier Experience</div><ul class="highlights">`;
    visEarlier.forEach(e => html += `<li>${e.text}</li>`);
    html += `</ul></div>`;
  }

  // Two-column: advisory + education/research
  const visAdvisory = CV.advisory.filter(show);
  const visResearch = CV.research.filter(show);

  html += `<div class="two-col">`;

  // Left: advisory
  if (visAdvisory.length) {
    html += `<div class="section"><div class="section-title">Advisory and Boards</div>`;
    visAdvisory.forEach(a => {
      html += `<div class="compact-item">
        <div class="item-org">${a.org}</div>
        <div class="item-detail">${a.role}</div>
        <div class="item-dates">${a.dates}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Right: education + research
  html += `<div>`;
  html += `<div class="section"><div class="section-title">Education</div>`;
  CV.education.forEach(e => {
    html += `<div class="compact-item">
      <div class="item-org">${e.org}</div>
      <div class="item-detail">${e.detail}</div>
      <div class="item-dates">${e.dates}</div>
    </div>`;
  });
  html += `</div>`;

  if (visResearch.length) {
    html += `<div class="section"><div class="section-title">Research Collaborations</div>`;
    visResearch.forEach(r => {
      const titleHtml = r.url
        ? `<a href="${r.url}" target="_blank" style="color: var(--fg); text-decoration: none; border-bottom: 1px solid var(--border);">${r.title}</a>`
        : r.title;
      const journalHtml = r.journal ? `<div class="item-dates">${r.journal} (${r.year})${r.authors ? ' — ' + r.authors : ''}</div>` : '';
      html += `<div class="compact-item">
        <div class="item-detail">${titleHtml}</div>
        ${journalHtml}
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div></div>`;

  document.getElementById('cv').innerHTML = html;
}

render();
</script>
</body>
</html>
